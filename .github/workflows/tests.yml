name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }} / ${{ matrix.dependency-set }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            dependency-set: full
            requirements-file: requirements.txt
          - os: windows-latest
            python-version: "3.11"
            dependency-set: full
            requirements-file: requirements.txt
          - os: windows-latest
            python-version: "3.12"
            dependency-set: core
            requirements-file: requirements-core.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ${{ matrix.requirements-file }}

      - name: Compile main script
        run: python -m py_compile run_chem_pdf_extractor.py

      - name: Check module entrypoint
        run: python -m chem_pdf_extractor --help

      - name: Run lightweight local tests
        run: python -m unittest discover -s tests -v
